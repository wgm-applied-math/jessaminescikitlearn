name: Build

# Run when a versioned push is performed to branch main
on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

  pull_request:
    branches: [ "main" ]

# Need permission to write the resulting package files
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Hatch
        run: |
          pip install --upgrade hatch

      - name: Build project
        run: |
          hatch build

      - name: Create release with package files
        # This token will be created automatically:
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            ./dist/*
